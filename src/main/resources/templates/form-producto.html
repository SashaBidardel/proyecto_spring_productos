<!doctype html>
<html lang="eS" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>formulario producto</title>
</head>
<body>
    <h1 th:text="${producto.id} ? 'Edición Producto' : 'Creación Producto'"></h1>
    <form action="#" th:action="@{/productos/nuevo}" method="post" th:object="${producto}">
        <input type="hidden" th:field="*{id}" id="id">
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" th:field="*{nombre}" placeholder="Nombre del producto">
        <label for="precio">Precio</label>
        <input id="precio" type="number"  step="0.01" th:field="*{precio}" placeholder="Precio del producto">
        <label for="categoria">Categoria</label>
        <select id="categoria" th:field="*{categoria.id}">
            <option value="">---Seleccione una---</option>
            <option th:each="c: ${categorias}" th:value="${c.id}" th:text="${c.nombre}"></option>
        </select>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
