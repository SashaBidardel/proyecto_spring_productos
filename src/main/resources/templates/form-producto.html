<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<div th:replace="fragments/head :: head"></div>
<link rel="stylesheet" th:href="@{/css/estilos-form.css}">
<title>Formulario Producto</title>
</head>
<body>
<div th:replace="fragments/cabecera :: header"></div>

<h1 th:text="${producto.id} != null ? 'Edición Producto' : 'Creación Producto'"></h1>

<form th:action="@{/productos/nuevo}" th:object="${producto}" method="post">
    <input type="hidden" th:field="*{id}" id="id">

    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" th:field="*{nombre}" placeholder="Nombre del producto" required>

    <label for="precio">Precio</label>
    <input id="precio" type="number" step="0.01" th:field="*{precio}" placeholder="Precio del producto" required>

    <label for="categoria">Categoría</label>
    <select id="categoria" th:field="*{categoria.id}">
        <!-- Opción por defecto vacía (deshabilitada) -->
        <option th:value="${null}" disabled
                th:selected="${producto.categoria == null}">---Seleccione una---</option>

        <!-- Lista de categorías -->
        <option th:each="c : ${categorias}"
                th:value="${c.id}"
                th:text="${c.nombre}"
                th:selected="${producto.categoria != null} ? ${c.id} == ${producto.categoria.id} : ${c.nombre == 'General'}">
        </option>
    </select>

    <input type="submit" value="Enviar">
</form>

<div th:replace="fragments/footer :: pie"></div>
</body>
</html>
