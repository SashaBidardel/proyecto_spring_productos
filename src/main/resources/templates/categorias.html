<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:replace="fragments/head :: head"></div>
    <title>Categorias</title>
</head>
<body>
    <div th:replace="fragments/cabecera :: header"></div>
    <h1>CATEGORÍAS</h1>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/categorias/nuevo}"><button class="nuevo">Crear categoría</button></a>
    <table BORDER="1">
        <tr>
           <th>Nombre</th>
           <th>ID</th>
            <th sec:authorize="hasRole('ADMIN')">Editar</th>
            <th sec:authorize="hasRole('ADMIN')" >Borrar</th>
        </tr>
        <tr th:each="categoria: ${categorias}">
            <td ><a th:href="@{/categorias/{id}(id=${categoria.id})}" th:text="${categoria.nombre}"></a></td>
            <td th:text="${categoria.id}"></td>
            <td sec:authorize="hasRole('ADMIN')"  ><a th:href="@{/categorias/editar/{id}(id=${categoria.id})}"><button class="editar">Editar</button></a></td>
            <td sec:authorize="hasRole('ADMIN')"  ><a th:href="@{/categorias/borrar/{id}(id=${categoria.id})}"><button class="borrar">Borrar</button></a></td>
        </tr>
    </table>
    <div th:replace="fragments/footer :: pie"></div>
</body>
</html>
