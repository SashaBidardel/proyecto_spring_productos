<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<div th:replace="fragments/head :: head"></div>
<link rel="stylesheet" th:href="@{/css/estilos-form.css}">
    <title>Formulario de Usuario</title>
</head>
<body>
<div th:replace="fragments/cabecera :: header"></div>
<h1>Formulario de Usuario</h1>

<form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post" id="formUsuario">

    <!-- Username -->
    <div>
        <label for="username">Nombre de usuario:</label>
        <input type="text" id="username" autocomplete="off"  th:field="*{username}" required/>
    </div>

    <!-- Password -->
    <div>
        <label for="password">Contraseña:</label>
        <input type="password" id="password" autocomplete="new-password" th:field="*{password}" required/>
    </div>

    <!-- Rol (solo admin puede cambiarlo) -->
    <div sec:authorize="hasRole('ADMIN')">
        <label for="role">Rol:</label>
        <select id="role" th:field="*{role}">
            <option value="ADMIN">ADMIN</option>
            <option value="USER">USER</option>
        </select>
    </div>

    <!-- Botón de enviar -->
    <div>
        <button type="submit">Guardar Usuario</button>
    </div>

</form>
<div th:replace="fragments/footer :: pie"></div>
<!-- Script para limpiar campos tras submit -->

</body>
</html>
