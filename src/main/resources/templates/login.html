<!-- templates/login.html -->
<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/estilos-form.css}">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>



<main class="form-container">
    <h1>Iniciar sesión</h1>

    <!-- Mensaje de error si login falla -->
    <div th:if="${param.error}" class="error-msg">
        Usuario o contraseña incorrectos
    </div>

    <!-- Formulario de login -->
    <form th:action="@{/login}" method="post" class="login-form">
        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" autocomplete="off"  placeholder="nombre de usuario" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" autocomplete="new-password" placeholder="contraseña" required>
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
    </form>

    <!-- Enlace a registro -->
    <p>¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a></p>
</main>

<!-- Footer -->
<div th:replace="fragments/footer :: pie"></div>

</body>
</html>
