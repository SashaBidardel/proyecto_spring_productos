<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<div th:replace="fragments/head :: head"></div>
    <title>Página Productos</title>
</head>

<body>
    <div th:replace="fragments/cabecera :: header"></div>
    <h1 >Página productos</h1>

   <a sec:authorize="hasRole('ADMIN')" th:href="@{/productos/nuevo}"><button class="nuevo">Crear producto</button></a>
   <table border="1">
       <tr>
           <th>Nombre</th>
           <th>Precio</th>
           <th sec:authorize="hasRole('ADMIN')" >Editar</th>
           <th sec:authorize="hasRole('ADMIN')" >Borrar</th>
       </tr>
       <tr th:each="producto: ${productos}" th:classappend="${producto.precio > 300} ? 'rojo' : ''"   >
           <td><a th:href="@{/productos/{id}(id=${producto.id})}" th:text="${producto.nombre}"></a></td>
           <td th:text="${producto.precio}"></td>
            <td sec:authorize="hasRole('ADMIN')" ><a  th:href="@{/productos/editar/{id}(id=${producto.id})}"><button class="editar">Editar</button></a></td>
            <td sec:authorize="hasRole('ADMIN')" ><a  th:href="@{/productos/borrar/{id}(id=${producto.id})}"><button class="borrar">Borrar</button></a></td>
       </tr>

   </table>
    <div th:replace="fragments/footer :: pie"></div>
</body>
</html>
